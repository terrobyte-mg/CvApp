<body>
  <div
    class="min-h-screen bg-background text-foreground font-body selection:bg-primary\/30 relative overflow-hidden flex flex-col justify-between"
    style="font-family: Inter, ui-sans-serif, system-ui, sans-serif;"
  >
    <!-- Subtle grid background -->
    <div
      class="absolute inset-0 grid-bg"
      style="pointer-events:none; z-index:0;"
    ></div>

    <!-- Top hero gradient overlay -->
    <div
      class="absolute top-0 left-0 w-full"
      style="height:500px; background: linear-gradient(to bottom, color-mix(in oklab, #8b5cf6 10%, transparent), transparent); pointer-events:none; z-index:1;"
    ></div>

    <!-- ═══════════════════════════════════════════ NAVBAR ═══ -->
    <nav
      style="
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        background-color: color-mix(in oklab, #090d16 80%, transparent);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid color-mix(in oklab, white 10%, transparent);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      "
    >
      <!-- Logo -->
      <div style="display:flex; align-items:center; gap:0.5rem;">
        <div
          style="
            width:32px; height:32px; border-radius:8px;
            background: linear-gradient(to bottom right, #8b5cf6, #3b82f6);
            display:flex; align-items:center; justify-content:center;
          "
        >
          <iconify-icon icon="lucide:file-text" style="color:white; font-size:18px;"></iconify-icon>
        </div>
        <span style="font-size:20px; font-weight:700; letter-spacing:-0.025em; color:white; font-family:Inter,sans-serif;">
          CvApp.
        </span>
      </div>

      <!-- Auth buttons -->
      <div style="display:flex; align-items:center; gap:1rem;">
        <button
          class="btn-ghost"
          style="
            font-size:14px; font-weight:500; color:color-mix(in oklab,white 80%,transparent);
            background:none; border:none; padding:0.5rem 0.75rem;
            transition: color 0.15s;
          "
          onclick="window.location.href='connexion.html'"
        >
          Connexion
        </button>
        <button
          class="btn-secondary"
          style="
            font-size:14px; font-weight:500;
            background-color: color-mix(in oklab, white 10%, transparent);
            border: 1px solid color-mix(in oklab, white 20%, transparent);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.15s;
          "
          onclick="window.location.href='inscription.html'"
        >
          S'inscrire
        </button>
      </div>
    </nav>

    <!-- ═══════════════════════════════════════════ HERO ═══ -->
    <section
      style="
        padding-top: 8rem;
        padding-bottom: 6rem;
        padding-inline: 2rem;
        max-width: 80rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4rem;
        position: relative;
        z-index: 10;
        width: 100%;
      "
      class="hero-section"
    >
      <!-- Glow left -->
      <div
        class="glow-orb"
        style="
          top:50%; left:25%;
          transform: translateX(-50%) translateY(-50%);
          width:24rem; height:24rem;
          background: color-mix(in oklab, #8b5cf6 20%, transparent);
          filter: blur(120px);
          z-index:0;
        "
      ></div>
      <!-- Glow right -->
      <div
        class="glow-orb"
        style="
          top:50%; right:25%;
          transform: translateX(50%) translateY(-50%);
          width:24rem; height:24rem;
          background: color-mix(in oklab, #3b82f6 20%, transparent);
          filter: blur(120px);
          z-index:0;
        "
      ></div>

      <div style="display:flex; flex-direction:column; align-items:flex-start; flex:1; z-index:10; max-width:600px;">

        <!-- Heading -->
        <h1
          style="
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            color: white;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
            font-family: Inter, sans-serif;
          "
        >
          Crée ton&nbsp;<span
            style="
              color: transparent;
              background: linear-gradient(to right, #8b5cf6, #3b82f6);
              -webkit-background-clip: text;
              background-clip: text;
            "
          >CV professionnel</span><br />en quelques minutes
        </h1>

        <!-- Subtitle -->
        <p
          style="
            font-size:18px;
            color: #8f9bb3;
            margin-bottom: 2.5rem;
            max-width: 36rem;
            line-height: 1.625;
          "
        >
          Simple. Rapide. Moderne. Propulse ta carrière avec un design qui se démarque.
        </p>

        <!-- CTA -->
        <button
          class="btn-primary"
          style="
            padding: 1rem 2rem;
            background: white;
            color: #090d16;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
            cursor: pointer;
          "
          onclick="window.location.href='editeur.html'"
        >
          Créer mon CV
          <iconify-icon icon="lucide:arrow-right" style="font-size:18px;"></iconify-icon>
        </button>
      </div>

      <!-- Preview card (right column) -->
      <div
        style="
          flex:1; width:100%; max-width:480px; z-index:10; position:relative;
        "
      >
        <!-- Main glass card -->
        <div
          style="
            background: color-mix(in oklab, white 5%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid color-mix(in oklab, white 10%, transparent);
            border-radius: 1rem;
            padding: 1.5rem;
            rotate: 2deg;
          "
        >
          <!-- Avatar + name skeleton -->
          <div style="display:flex; align-items:flex-start; gap:1rem; margin-bottom:1.5rem;">
            <div style="width:64px; height:64px; border-radius:9999px; background:color-mix(in oklab,white 10%,transparent); flex-shrink:0;"></div>
            <div style="flex:1; padding-top:0.5rem; display:flex; flex-direction:column; gap:0.5rem;">
              <div style="height:16px; width:75%; background:color-mix(in oklab,white 20%,transparent); border-radius:4px;"></div>
              <div style="height:12px; width:50%; background:color-mix(in oklab,white 10%,transparent); border-radius:4px;"></div>
            </div>
          </div>

          <!-- Text lines skeleton -->
          <div style="display:flex; flex-direction:column; gap:1rem; margin-bottom:1.5rem;">
            <div style="height:8px; width:100%; background:color-mix(in oklab,white 5%,transparent); border-radius:4px;"></div>
            <div style="height:8px; width:100%; background:color-mix(in oklab,white 5%,transparent); border-radius:4px;"></div>
            <div style="height:8px; width:80%; background:color-mix(in oklab,white 5%,transparent); border-radius:4px;"></div>
          </div>

          <!-- Two blocks skeleton -->
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div style="height:96px; background:color-mix(in oklab,white 5%,transparent); border-radius:12px; border:1px solid color-mix(in oklab,white 5%,transparent);"></div>
            <div style="height:96px; background:color-mix(in oklab,white 5%,transparent); border-radius:12px; border:1px solid color-mix(in oklab,white 5%,transparent);"></div>
          </div>
        </div>

        <!-- Floating pill — top right -->
        <div
          style="
            background: color-mix(in oklab, white 5%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid color-mix(in oklab, white 10%, transparent);
            border-radius: 1rem;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: absolute;
            right: -2rem;
            top: 3rem;
          "
        >
          <div
            style="
              width:32px; height:32px; border-radius:9999px;
              background: color-mix(in oklab, #3b82f6 20%, transparent);
              display:flex; align-items:center; justify-content:center; flex-shrink:0;
            "
          >
            <iconify-icon icon="lucide:check" style="color:#3b82f6; font-size:16px;"></iconify-icon>
          </div>
          <div style="display:flex; flex-direction:column; gap:4px;">
            <div style="height:8px; width:64px; background:color-mix(in oklab,white 20%,transparent); border-radius:4px;"></div>
            <div style="height:6px; width:40px; background:color-mix(in oklab,white 10%,transparent); border-radius:4px;"></div>
          </div>
        </div>

        <!-- Floating pill — bottom left -->
        <div
          style="
            background: color-mix(in oklab, white 5%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid color-mix(in oklab, white 10%, transparent);
            border-radius: 1rem;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: absolute;
            left: -3rem;
            bottom: 6rem;
          "
        >
          <div
            style="
              width:32px; height:32px; border-radius:9999px;
              background: color-mix(in oklab, #8b5cf6 20%, transparent);
              display:flex; align-items:center; justify-content:center; flex-shrink:0;
            "
          >
            <iconify-icon icon="lucide:sparkles" style="color:#8b5cf6; font-size:16px;"></iconify-icon>
          </div>
          <div style="display:flex; flex-direction:column; gap:4px;">
            <div style="height:8px; width:80px; background:color-mix(in oklab,white 20%,transparent); border-radius:4px;"></div>
            <div style="height:6px; width:48px; background:color-mix(in oklab,white 10%,transparent); border-radius:4px;"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════ FOOTER ═══ -->
    <footer
      style="
        padding-block: 3rem;
        text-align: center;
        position: relative;
        z-index: 10;
      "
    >
      <div style="display:flex; align-items:center; justify-content:center; gap:0.5rem; margin-bottom:0.5rem;">
        <div
          style="
            width:24px; height:24px; border-radius:6px;
            background: linear-gradient(to bottom right, #8b5cf6, #3b82f6);
            display:flex; align-items:center; justify-content:center;
          "
        >
          <iconify-icon icon="lucide:file-text" style="color:white; font-size:12px;"></iconify-icon>
        </div>
        <span style="font-family:Inter,sans-serif; font-weight:700; color:white;">CvApp.</span>
      </div>
      <p style="font-size:12px; color: color-mix(in oklab, #8f9bb3 50%, transparent);">
        © 2024 CvApp. Tous droits réservés.
      </p>
    </footer>
  </div>

  <!-- Responsive layout: stack on mobile, side-by-side on desktop -->
  <style>
    @media (min-width: 64rem) {
      .hero-section {
        flex-direction: row !important;
        align-items: center !important;
      }
    }
    @media (max-width: 64rem) {
      .hero-section > div:last-child {
        max-width: 420px;
        margin-inline: auto;
      }
    }
    @media (max-width: 40rem) {
      .hero-section > div:last-child {
        display: none;
      }
    }
  </style>

  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
</body>
</html>
