{% extends "base.html" %}

{% block content %}

<div class="onboarding-wrapper">

    <h1>Diplôme</h1>

    <div class="form-container">

        <form method="POST">
            {% csrf_token %}

            <div class="form-fields">
                {{ form.as_p }}
            </div>

            <div class="wizard-actions">

                <button type="submit" class="btn-primary">
                    Enregistrer
                </button>

                <a href="{% url 'diplome_list' %}" class="btn-secondary">
                    Retour
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
