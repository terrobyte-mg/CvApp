{% extends "base.html" %}

{% block title %}Compétences{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/competence_form.css' }">
{% endblock %}

{% block content %}

<div class="onboarding-wrapper">

    <div class="onboarding-header">

        <h1>Mes compétences</h1>

        <p>Sélectionne les compétences à afficher dans ton CV</p>

    </div>

    <div class="form-container">

        <form method="POST">

            {% csrf_token %}

            <div class="form-fields">

                {{ form.competences }}

            </div>

            <div class="wizard-actions">

                <button type="submit" class="btn-primary">
                    Enregistrer
                </button>

                <a href="{% url 'cv_manager' %}" class="btn-secondary">
                    Retour
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
