{% extends "base.html" %}
{% load static %}

{% block title %}CV Builder{% endblock %}

{% block content %}
<div class="builder-layout">

    <div class="builder-controls">

        <h3>Templates</h3>
        <div class="template-btns">
            <button onclick="changeTemplate('minimal')" class="tpl-btn {% if settings.template == 'minimal' %}active{% endif %}" data-tpl="minimal">
                Minimaliste
            </button>
            <button onclick="changeTemplate('modern')" class="tpl-btn {% if settings.template == 'modern' %}active{% endif %}" data-tpl="modern">
                Moderne
            </button>
            <button onclick="changeTemplate('future')" class="tpl-btn {% if settings.template == 'future' %}active{% endif %}" data-tpl="future">
                Futuriste
            </button>
        </div>

        <hr>

        <h3>Police</h3>
        <select id="fontSelect" onchange="changeFont(this.value)">
            <option value="Arial" {% if settings.font_family == 'Arial' %}selected{% endif %}>Arial</option>
            <option value="Georgia" {% if settings.font_family == 'Georgia' %}selected{% endif %}>Georgia</option>
            <option value="'Courier New'" {% if settings.font_family == 'Courier New' %}selected{% endif %}>Courier New</option>
            <option value="Verdana" {% if settings.font_family == 'Verdana' %}selected{% endif %}>Verdana</option>
        </select>

        <hr>

        <h3>Sections visibles</h3>
        <form method="post" id="settingsForm">
            {% csrf_token %}
            <input type="hidden" name="template" id="templateInput" value="{{ settings.template }}">
            <input type="hidden" name="font_family" id="fontInput" value="{{ settings.font_family }}">

            <label class="toggle-label">
                <input type="checkbox" name="show_profile" {% if settings.show_profile %}checked{% endif %}>
                Profil
            </label>
            <label class="toggle-label">
                <input type="checkbox" name="show_diplomes" {% if settings.show_diplomes %}checked{% endif %}>
                Diplômes
            </label>
            <label class="toggle-label">
                <input type="checkbox" name="show_experiences" {% if settings.show_experiences %}checked{% endif %}>
                Expériences
            </label>
            <label class="toggle-label">
                <input type="checkbox" name="show_competences" {% if settings.show_competences %}checked{% endif %}>
                Compétences
            </label>

            <hr>
            <button type="submit" class="btn-primary" style="width:100%;">💾 Sauvegarder</button>
        </form>

        <hr>

        <h3>Actions</h3>
        <a href="{% url 'cv_manager' %}" class="btn-ghost" style="display:block; text-align:center; margin-bottom:8px;">⚙️ Gérer le CV</a>
        <a href="{% url 'cv_view' %}" class="btn-ghost" style="display:block; text-align:center;" target="_blank">👁 Voir mon CV</a>
    </div>

    <div class="builder-preview">
        <iframe
            id="cvFrame"
            src="{% url 'cv_preview' %}?template={{ settings.template }}"
            style="width:100%; height:90vh; border:none;"
        ></iframe>
    </div>

</div>

<script>
function changeTemplate(name) {
    document.getElementById("cvFrame").src = "{% url 'cv_preview' %}?template=" + name;
    document.getElementById("templateInput").value = name;
    document.querySelectorAll(".tpl-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tpl === name);
    });
}

function changeFont(value) {
    document.getElementById("fontInput").value = value;
}
</script>
{% endblock %}
